name: CI/CD - Build & Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "akhi1babu" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build --build-arg GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} -t akhi1babu/resume-project:latest .
          docker push akhi1babu/resume-project:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/resume-project
            
            cat > ~/resume-project/docker-compose.yml << 'EOF'
            version: "3.8"
            services:
              app:
                image: akhi1babu/resume-project:latest
                container_name: resume-analyzer-app
                restart: unless-stopped
                ports:
                  - "80:80"
            EOF

            cd ~/resume-project
            docker pull akhi1babu/resume-project:latest
            docker compose down || true
            docker compose up -d
            docker image prune -f
            echo "Deployment complete!"
